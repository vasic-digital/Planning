# Planning module — English bundle (active).
# Per CONST-046, every user-facing string in the Planning module
# resolves through pkg/i18n.Translator at the call site. This
# bundle is the English fallback consumed when a consuming project
# wires a YAML-loading translator. The NoopTranslator (default,
# standalone) returns the msgID directly; the call site assembles
# the user-visible string from the literal embedded alongside the
# migration (see planning/i18n_defaults.go).
#
# IDs are prefixed `planning_` per the CONST-046 cross-submodule
# convention so a single consuming-project bundle can merge entries
# from many submodules without collision.
schema_version: 1
locale: en
entries:
  planning_milestone_prompt_intro: |-
    Create a hierarchical plan for the following goal:
    "%s"

    Generate 3-5 high-level milestones that need to be achieved.
    For each milestone, provide:
    1. A clear name
    2. A description
    3. Any dependencies on other milestones (by number)

    Format as numbered list with details.
  planning_step_prompt_intro: |-
    For the milestone: "%s"
    Description: %s

    Generate 3-7 specific action steps to complete this milestone.
    Each step should be:
    1. Concrete and actionable
    2. Independently executable
    3. Verifiable for completion

    Format as numbered list.
  planning_step_execution_failed: "execution failed"
  # Round 2 (CONST-046 Phase 4 round 96): hint generation +
  # MCTS code-action prompts + Tree-of-Thoughts thought prompts +
  # evaluator prompt + terminal-keyword list + context label.
  planning_hints_prompt_intro: |-
    Given this context:
    %s

    Generate 2-3 specific hints or tips to help execute this step successfully.
    Focus on:
    - Edge cases to consider
    - Best practices
    - Common pitfalls to avoid

    Format as bullet points.
  planning_mcts_actions_prompt_intro: |-
    Given the current code state:
    %s

    Generate 3-5 possible next coding actions or modifications.
    Each action should be distinct and meaningful.
    Format: one action per line.
  planning_mcts_apply_action_prompt_intro: |-
    Current code state:
    %s

    Apply this action: %s

    Return the updated code state after applying the action.
  planning_tot_thoughts_prompt_intro: |-
    Given the current reasoning step:
    "%s"

    Generate %d distinct next steps or approaches to continue solving this problem.
    Each step should be different and explore a unique angle.
    Format each step on a new line starting with a number.
  planning_tot_initial_thoughts_prompt_intro: |-
    Given the problem:
    "%s"

    Generate %d distinct initial approaches or strategies to solve this problem.
    Each approach should be different and explore a unique angle.
    Format each approach on a new line starting with a number.
  planning_tot_evaluate_prompt_intro: |-
    Evaluate the following reasoning step on a scale of 0.0 to 1.0:
    "%s"

    Consider:
    - Logical validity
    - Progress toward solution
    - Feasibility
    - Clarity

    Respond with only a number between 0.0 and 1.0.
  planning_hiplan_context_label: |-
    Milestone: %s
    Description: %s
    Step: %s
    Action: %s
  # planning_tot_terminal_keywords is a CSV of locale-appropriate
  # tokens that indicate a thought has reached a terminal/solution
  # state. The English default is "solution,answer,result,conclusion,final";
  # consuming projects MUST override this for non-English locales so
  # the IsTerminal detector matches text the LLM actually emits.
  planning_tot_terminal_keywords: "solution,answer,result,conclusion,final"
